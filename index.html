<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>

    <script>
        try {
            localStorage.clear();
            sessionStorage.clear();
        } catch (e) {
            console.warn("Storage could not be cleared:", e);
        }
        window.location.replace("practice.html");
    </script>
</head>
<body>
    Redirecting to <a href="practice.html">practice.html</a>...
</body>
</html>
